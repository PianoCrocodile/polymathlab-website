<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLYMATHLAB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      color: #222;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 60px;
    }

    .logo {
      margin-bottom: 72px;
    }

    .logo img {
      height: 120px;
    }

    .projects {
      display: flex;
      gap: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .project-card {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transition: transform 0.2s ease;
    }

    .project-card:hover {
      transform: translateY(-4px);
    }

    .project-card:hover .thumbnail {
      border-color: #00b8d4;
      box-shadow: 0 8px 32px rgba(0, 184, 212, 0.15);
    }

    .thumbnail {
      width: 240px;
      height: 340px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .thumbnail canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumbnail .placeholder {
      color: #aaa;
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }

    .project-label {
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #555;
    }

    @media (max-width: 580px) {
      body { padding: 48px 20px 40px; }
      .logo img { height: 36px; }
      .logo { margin-bottom: 48px; }
      .projects { gap: 36px; }
      .thumbnail { width: 200px; height: 283px; }
    }
  </style>
</head>
<body>

  <div class="logo">
    <img src="logo.png" alt="POLYMATHLAB">
  </div>

  <div class="projects">

    <a class="project-card" href="Projeto_No__1.pdf" target="_blank" rel="noopener">
      <div class="thumbnail" id="thumb-1">
        <div class="placeholder">Loading...</div>
      </div>
      <span class="project-label">Projeto No. 1</span>
    </a>

  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    function renderPdfThumbnail(pdfUrl, containerId) {
      var container = document.getElementById(containerId);
      pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
        pdf.getPage(1).then(function(page) {
          var thumbWidth = 240 * 2;
          var viewport = page.getViewport({ scale: 1 });
          var scale = thumbWidth / viewport.width;
          var scaledViewport = page.getViewport({ scale: scale });

          var canvas = document.createElement('canvas');
          canvas.width = scaledViewport.width;
          canvas.height = scaledViewport.height;

          container.innerHTML = '';
          container.appendChild(canvas);

          page.render({
            canvasContext: canvas.getContext('2d'),
            viewport: scaledViewport
          });
        });
      }).catch(function() {
        container.innerHTML = '<div class="placeholder">PDF preview unavailable</div>';
      });
    }

    renderPdfThumbnail('Projeto_No__1.pdf', 'thumb-1');
  </script>

</body>
</html>
