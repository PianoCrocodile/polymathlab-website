<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLYMATHLAB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 24px;
    }

    .logo {
      margin-bottom: 72px;
    }

    .logo img {
      height: 120px;
    }

    .projects {
      display: flex;
      gap: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .project-card {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transition: transform 0.2s ease;
      cursor: pointer;
    }

    .project-card:hover {
      transform: translateY(-4px);
    }

    .project-card:hover .thumbnail {
      border-color: #00b8d4;
      box-shadow: 0 8px 32px rgba(0, 184, 212, 0.15);
    }

    .thumbnail {
      width: 240px;
      height: 340px;
      background: #f5f5f5;
      border: 1px solid #333;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .thumbnail canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumbnail .placeholder {
      color: #aaa;
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }

    .project-label {
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #aaa;
    }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-backdrop {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .modal-content {
      position: relative;
      width: 90%;
      max-width: 800px;
      height: 90vh;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      animation: modalIn 0.25s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #f5f5f5;
      border-bottom: 1px solid #e0e0e0;
    }

    .modal-title {
      font-size: 14px;
      font-weight: 500;
      color: #333;
    }

    .modal-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      border-radius: 4px;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .modal-btn:hover {
      background: #e0e0e0;
      color: #333;
    }

    .modal-btn svg {
      width: 18px;
      height: 18px;
    }

    .modal-body {
      flex: 1;
      overflow: hidden;
    }

    .modal-body iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Contact */
    @media (max-width: 580px) {
      body { padding: 48px 20px 40px; }
      .logo img { height: 36px; }
      .logo { margin-bottom: 48px; }
      .projects { gap: 36px; }
      .thumbnail { width: 200px; height: 283px; }
      .modal-content { width: 96%; height: 85vh; }
    }

    .contact {
      margin-top: auto;
      padding-top: 80px;
      position: relative;
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      gap: 12px;
    }

    .contact-label {
      font-size: 15px;
      font-weight: 400;
      color: #fff;
      cursor: default;
      letter-spacing: 0.03em;
    }

    .email-row {
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
    }

    .contact:hover .email-row {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .email-text {
      font-size: 14px;
      color: #888;
      letter-spacing: 0.01em;
    }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      transition: color 0.15s ease;
    }

    .copy-btn:hover {
      color: #fff;
    }

    .copy-btn svg {
      width: 16px;
      height: 16px;
    }

    body.modal-open {
      overflow: hidden;
    }
  </style>
</head>
<body>

  <div class="logo">
    <img src="logo.png" alt="POLYMATHLAB">
  </div>

  <div class="projects">

    <div class="project-card" onclick="openPdf('Projeto_No_1.pdf', 'Projeto No. 1')">
      <div class="thumbnail" id="thumb-1">
        <div class="placeholder">Loading...</div>
      </div>
      <span class="project-label">Projeto No. 1</span>
    </div>

    <div class="project-card" onclick="openPdf('Projeto_No_2.pdf', 'Projeto No. 2')">
      <div class="thumbnail" id="thumb-2">
        <div class="placeholder">Loading...</div>
      </div>
      <span class="project-label">Projeto No. 2</span>
    </div>

  </div>

  <!-- PDF Modal -->
  <div class="modal-overlay" id="pdfModal">
    <div class="modal-backdrop" onclick="closePdf()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle"></span>
        <div class="modal-actions">
          <a class="modal-btn" id="modalDownload" href="" target="_blank" title="Open in new tab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
              <polyline points="15 3 21 3 21 9"></polyline>
              <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
          </a>
          <button class="modal-btn" onclick="closePdf()" title="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
      <div class="modal-body">
        <iframe id="modalIframe" src=""></iframe>
      </div>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    function renderPdfThumbnail(pdfUrl, containerId) {
      var container = document.getElementById(containerId);
      pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
        pdf.getPage(1).then(function(page) {
          var thumbWidth = 240 * 2;
          var viewport = page.getViewport({ scale: 1 });
          var scale = thumbWidth / viewport.width;
          var scaledViewport = page.getViewport({ scale: scale });

          var canvas = document.createElement('canvas');
          canvas.width = scaledViewport.width;
          canvas.height = scaledViewport.height;

          container.innerHTML = '';
          container.appendChild(canvas);

          page.render({
            canvasContext: canvas.getContext('2d'),
            viewport: scaledViewport
          });
        });
      }).catch(function() {
        container.innerHTML = '<div class="placeholder">PDF preview unavailable</div>';
      });
    }

    renderPdfThumbnail('Projeto_No_1.pdf', 'thumb-1');
    renderPdfThumbnail('Projeto_No_2.pdf', 'thumb-2');

    function openPdf(url, title) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalDownload').href = url;
      document.getElementById('modalIframe').src = url;
      document.getElementById('pdfModal').classList.add('active');
      document.body.classList.add('modal-open');
    }

    function closePdf() {
      document.getElementById('pdfModal').classList.remove('active');
      document.body.classList.remove('modal-open');
      document.getElementById('modalIframe').src = '';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closePdf();
    });
  </script>

  <div class="contact">
    <span class="contact-label">Contact</span>
    <div class="email-row">
      <span class="email-text" id="email-display"></span>
      <button class="copy-btn" onclick="copyEmail(this)" aria-label="Copy email">
        <svg class="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
        <svg class="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </button>
    </div>
  </div>

  <script>
    function getAddr() {
      var p = ['luizg','scheuer'];
      return p[0] + p[1] + String.fromCharCode(64) + 'gm' + 'ail' + '.' + 'com';
    }
    document.getElementById('email-display').textContent = getAddr();

    function copyEmail(btn) {
      navigator.clipboard.writeText(getAddr());
      var copyIcon = btn.querySelector('.icon-copy');
      var checkIcon = btn.querySelector('.icon-check');
      copyIcon.style.display = 'none';
      checkIcon.style.display = 'block';
      btn.style.color = '#00b8d4';
      setTimeout(function() {
        copyIcon.style.display = 'block';
        checkIcon.style.display = 'none';
        btn.style.color = '';
      }, 1500);
    }
  </script>

</body>
</html>
