<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLYMATHLAB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #2a2a2a;
      color: #e0e0e0;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 60px;
    }

    .logo {
      margin-bottom: 72px;
    }

    .logo img {
      height: 48px;
      filter: invert(1);
      opacity: 0.92;
    }

    .projects {
      display: flex;
      gap: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .project-card {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transition: transform 0.2s ease;
    }

    .project-card:hover {
      transform: translateY(-4px);
    }

    .project-card:hover .thumbnail {
      border-color: #00b8d4;
      box-shadow: 0 8px 32px rgba(0, 184, 212, 0.15);
    }

    .thumbnail {
      width: 240px;
      height: 340px;
      background: #f5f5f5;
      border: 2px solid #444;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumbnail .placeholder {
      color: #999;
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }

    .project-label {
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.02em;
      opacity: 0.75;
    }

    @media (max-width: 580px) {
      body { padding: 48px 20px 40px; }
      .logo img { height: 36px; }
      .logo { margin-bottom: 48px; }
      .projects { gap: 36px; }
      .thumbnail { width: 200px; height: 283px; }
    }
  </style>
</head>
<body>

  <div class="logo">
    <img src="logo.png" alt="POLYMATHLAB">
  </div>

  <div class="projects">

    <a class="project-card" href="pdfs/projeto-no-1.pdf" target="_blank" rel="noopener">
      <div class="thumbnail">
        <div class="placeholder">PDF — Projeto No. 1</div>
      </div>
      <span class="project-label">Projeto No. 1</span>
    </a>

    <a class="project-card" href="pdfs/projeto-no-2.pdf" target="_blank" rel="noopener">
      <div class="thumbnail">
        <div class="placeholder">PDF — Projeto No. 2</div>
      </div>
      <span class="project-label">Projeto No. 2</span>
    </a>

  </div>

</body>
</html>
